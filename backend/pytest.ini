[pytest]
# Directorio raíz de tests
testpaths = tests

# Versión mínima requerida de pytest
minversion = 7.0

# Markers personalizados (evitan warning "PytestUnknownMarkWarning")
markers =
    integration: Tests que requieren PostgreSQL disponible (skipped sin DB)
    slow: Tests lentos o dependientes de estado externo (ej. rate limiting)

# Opciones por defecto: verbose + mostrar motivo de skip
addopts = -v --tb=short

# Cobertura: habilitada al pasar --cov explícitamente
# Ejemplo: pytest --cov=app --cov-report=term-missing --cov-fail-under=80
