services:
  # ── Frontend (React / Vite — modo dev para el MVP) ────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    volumes:
      # Bind mount del código: habilita HMR (puede ser lento en Windows)
      - ./frontend:/frontend
      # Preservar node_modules del contenedor; no sobreescribir con el del host
      - /frontend/node_modules
    networks:
      - iuris_net
    environment:
      # En Docker el backend está en la red interna como "backend:8000"
      # (localhost apuntaría al propio contenedor frontend)
      - VITE_API_URL=http://backend:8000
      - CI=true
    restart: unless-stopped

  # ── Backend (FastAPI / Uvicorn) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - iuris_net
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Base de datos (PostgreSQL 16) ─────────────────────────────────
  # NOTA: db NO expone puerto al host; solo accesible dentro de iuris_net.
  # El backend referencia la DB por hostname "db" (nunca localhost).
  db:
    image: postgres:16
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - iuris_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── MinIO (object storage S3-compatible — dev/test) ──────────────
  # En prod se reemplaza por Cloudflare R2; solo cambian las env vars (ADR-0010).
  minio:
    image: minio/minio
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Consola web
    env_file:
      - .env
    environment:
      - MINIO_ROOT_USER=${STORAGE_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${STORAGE_SECRET_KEY}
      # Permite PUT/GET preflight desde el frontend en dev (presigned URLs)
      - MINIO_API_CORS_ALLOW_ORIGIN=http://localhost:3001
    volumes:
      - minio_data:/data
    networks:
      - iuris_net
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── minio-init (crea bucket iuris-docs al arrancar) ───────────────
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - iuris_net
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${STORAGE_ACCESS_KEY} $${STORAGE_SECRET_KEY} &&
      mc mb --ignore-existing local/$${STORAGE_BUCKET_NAME} &&
      mc anonymous set none local/$${STORAGE_BUCKET_NAME} &&
      echo 'Bucket $${STORAGE_BUCKET_NAME} listo.'
      "

  # ── n8n (orquestación + IA — workflows en n8n/workflows/) ─────────
  # NOTA DE SEGURIDAD: el puerto 5678 se expone solo para desarrollo local.
  # En producción, n8n debe quedar detrás de un proxy/red privada y NO
  # estar accesible públicamente.
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      # URL del backend dentro de la red Docker (usada por HTTP Request Tool en WF-01)
      - BACKEND_URL=${BACKEND_URL:-http://backend:8000}
      # Secreto compartido para autenticar llamadas internas backend→n8n y n8n→backend
      - N8N_INTERNAL_SECRET=${N8N_INTERNAL_SECRET}
      # Permite acceder a variables de entorno ($env) desde expresiones en nodos de workflow
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # Zona horaria del estudio: el Schedule Trigger de WF-05 (07:00 diario)
      # se evalúa en esta tz de instancia, no en UTC (RF-26, comunicaciones-2).
      - GENERIC_TIMEZONE=America/Argentina/Buenos_Aires
      - TZ=America/Argentina/Buenos_Aires
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
    networks:
      - iuris_net
    restart: unless-stopped

# ── Redes ──────────────────────────────────────────────────────────
networks:
  iuris_net:
    driver: bridge

# ── Volúmenes nombrados ────────────────────────────────────────────
volumes:
  db_data: # Persistencia de PostgreSQL — sobrevive a reinicios sin "down -v"
  n8n_data: # Persistencia del home de n8n (credenciales, configuración)
  minio_data: # Persistencia de MinIO (objetos del bucket iuris-docs)
