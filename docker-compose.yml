services:
  # ── Frontend (React / Vite — modo dev para el MVP) ────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # Bind mount del código: habilita HMR (puede ser lento en Windows)
      - ./frontend:/frontend
      # Preservar node_modules del contenedor; no sobreescribir con el del host
      - /frontend/node_modules
    networks:
      - iuris_net
    environment:
      - VITE_API_URL=http://localhost:8000
      - CI=true
    restart: unless-stopped

  # ── Backend (FastAPI / Uvicorn) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - iuris_net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Base de datos (PostgreSQL 16) ─────────────────────────────────
  # NOTA: db NO expone puerto al host; solo accesible dentro de iuris_net.
  # El backend referencia la DB por hostname "db" (nunca localhost).
  db:
    image: postgres:16
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - iuris_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── n8n (orquestación + IA — workflows en n8n/workflows/) ─────────
  # NOTA DE SEGURIDAD: el puerto 5678 se expone solo para desarrollo local.
  # En producción, n8n debe quedar detrás de un proxy/red privada y NO
  # estar accesible públicamente.
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
    networks:
      - iuris_net
    restart: unless-stopped

# ── Redes ──────────────────────────────────────────────────────────
networks:
  iuris_net:
    driver: bridge

# ── Volúmenes nombrados ────────────────────────────────────────────
volumes:
  db_data: # Persistencia de PostgreSQL — sobrevive a reinicios sin "down -v"
  n8n_data: # Persistencia del home de n8n (credenciales, configuración)
